services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: battlebanana-vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    gpus: all
    shm_size: '1gb'
    networks:
      - battlebanana-network
    volumes:
      - ./.vllm_cache:/root/.cache/huggingface
    command: >
      --model Qwen/Qwen2.5-7B-Instruct-AWQ
      --quantization awq_marlin
      --max-model-len 8192
      --max-num-seqs 64
      --gpu-memory-utilization 0.90
      --safetensors-load-strategy prefetch

  bot:
    build: .
    container_name: battlebanana-bot
    restart: unless-stopped
    depends_on:
      - vllm
    volumes:
      - ./logs:/usr/src/app/logs
      - ./assets:/usr/src/app/assets
    networks:
      - battlebanana-network
    labels:
      - io.portainer.accesscontrol.teams=BattleBanana

networks:
  battlebanana-network:
    driver: bridge
